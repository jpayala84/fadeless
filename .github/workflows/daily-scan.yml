name: Daily Netlify Scan

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch: {}

jobs:
  trigger-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify function
        env:
          NETLIFY_FUNCTION_URL: https://fadeless.app/.netlify/functions/daily-scan
        run: |
          echo "Triggering Netlify function at $NETLIFY_FUNCTION_URL"
          response="$(curl -sS -X POST --max-time 60 -w '\n%{http_code}' "$NETLIFY_FUNCTION_URL")"
          body="$(echo "$response" | sed '$d')"
          status="$(echo "$response" | tail -n 1)"
          echo "$body"
          echo "HTTP $status"
          # daily-scan returns 202 (scheduled) when the background scan is triggered successfully.
          if [[ "$status" != 2* ]]; then
            exit 1
          fi
